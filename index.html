<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Sahithi</title>
<style>
body { margin:0; overflow:hidden; background:#0F051D; }
#hint {
position:absolute;
bottom:20px;
width:100%;
text-align:center;
color:white;
font-family:sans-serif;
letter-spacing:2px;
opacity:0.7;
}
</style>
</head>
<body>
<div id="hint">Tap to Begin ✨</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/FontLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/geometries/TextGeometry.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<script>

let scene, camera, renderer;
let stage = 0;
let heroGroup, cakeGroup, messageGroup;
let flames = [], smoke = [], confetti = [];

init();
animate();

function init(){
scene = new THREE.Scene();
scene.background = new THREE.Color(0x0F051D);

camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);
camera.position.set(0,0,30);

renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const ambient = new THREE.AmbientLight(0xffffff,0.8);
scene.add(ambient);

const pink = new THREE.PointLight(0xff4da6,2);
pink.position.set(10,15,10);
scene.add(pink);

window.addEventListener("resize",onResize);
window.addEventListener("click",handleClick);
window.addEventListener("touchstart",handleClick);

createStars();
}

function onResize(){
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
}

function createStars(){
const geo = new THREE.BufferGeometry();
const vertices=[];
for(let i=0;i<1500;i++){
vertices.push(
THREE.MathUtils.randFloatSpread(200),
THREE.MathUtils.randFloatSpread(200),
THREE.MathUtils.randFloatSpread(200)
);
}
geo.setAttribute('position',new THREE.Float32BufferAttribute(vertices,3));
const mat = new THREE.PointsMaterial({color:0xffffff,size:0.7});
const stars = new THREE.Points(geo,mat);
scene.add(stars);
}

function handleClick(){
if(stage===0){
document.getElementById("hint").style.display="none";
createHero();
stage=1;
}
else if(stage===1){
scene.remove(heroGroup);
createCake();
stage=2;
}
else if(stage===2){
blowCandles();
setTimeout(()=>{
scene.remove(cakeGroup);
createMessage();
stage=3;
},2500);
}
}

function createCenteredText(text, size, height, font, material){
const geo = new THREE.TextGeometry(text,{
font:font,
size:size,
height:height,
curveSegments:12
});
geo.computeBoundingBox();
geo.center();
return new THREE.Mesh(geo,material);
}

function createHero(){
heroGroup = new THREE.Group();
scene.add(heroGroup);

const loader=new THREE.FontLoader();
loader.load('https://threejs.org/examples/fonts/helvetiker_bold.typeface.json',font=>{

const mat = new THREE.MeshStandardMaterial({
color:0xff4da6,
metalness:1,
roughness:0.3,
emissive:0xff4da6,
emissiveIntensity:0.6
});

const title = createCenteredText("HAPPY BIRTHDAY SAHITHI",1.8,0.6,font,mat);
title.position.x=-50;
title.position.y=3;
heroGroup.add(title);

gsap.to(title.position,{x:0,duration:2,ease:"power4.out"});

const sub = createCenteredText("(Chotedonn)",1,0.4,font,
new THREE.MeshStandardMaterial({color:0xffffff}));

sub.position.y=-3;
sub.scale.set(0,0,0);
heroGroup.add(sub);

gsap.to(sub.scale,{x:1,y:1,z:1,duration:1.5,delay:1});
});
}

function createCake(){
cakeGroup=new THREE.Group();
scene.add(cakeGroup);

const mat=new THREE.MeshStandardMaterial({color:0xff85c2});
const tier1=new THREE.Mesh(new THREE.CylinderGeometry(5,5,2,32),mat);
const tier2=new THREE.Mesh(new THREE.CylinderGeometry(3.5,3.5,2,32),mat);
tier2.position.y=2;
const tier3=new THREE.Mesh(new THREE.CylinderGeometry(2.5,2.5,2,32),mat);
tier3.position.y=4;

cakeGroup.add(tier1,tier2,tier3);

for(let i=0;i<6;i++){
const candle=new THREE.Mesh(
new THREE.CylinderGeometry(0.2,0.2,1,16),
new THREE.MeshStandardMaterial({color:0xffffff})
);
candle.position.set(Math.cos(i)*2,5.5,Math.sin(i)*2);
cakeGroup.add(candle);

const flame=new THREE.Mesh(
new THREE.SphereGeometry(0.3,16,16),
new THREE.MeshBasicMaterial({color:0xffd166})
);
flame.position.y=0.8;
candle.add(flame);
flames.push(flame);
}

gsap.to(cakeGroup.rotation,{y:Math.PI*2,duration:15,repeat:-1,ease:"none"});
}

function blowCandles(){
flames.forEach(f=>f.visible=false);

for(let i=0;i<40;i++){
const s=new THREE.Mesh(
new THREE.SphereGeometry(0.2),
new THREE.MeshBasicMaterial({color:0xaaaaaa,transparent:true,opacity:0.6})
);
s.position.set(
THREE.MathUtils.randFloatSpread(4),
6,
THREE.MathUtils.randFloatSpread(4)
);
scene.add(s);
smoke.push(s);
}

for(let i=0;i<150;i++){
const piece=new THREE.Mesh(
new THREE.BoxGeometry(0.2,0.2,0.2),
new THREE.MeshBasicMaterial({color:Math.random()*0xffffff})
);
piece.position.set(0,6,0);
scene.add(piece);
confetti.push(piece);
}
}

function createMessage(){
messageGroup=new THREE.Group();
scene.add(messageGroup);

const loader=new THREE.FontLoader();
loader.load('https://threejs.org/examples/fonts/helvetiker_regular.typeface.json',font=>{

const lines=[
"Happy Birthday to the most incredible person 🌸✨",
"You are the kind of person who makes everything better.",
"You deserve all the happiness and magic life offers.",
"Happy birthday Chotedonn!!"
];

lines.forEach((line,i)=>{
const mesh=createCenteredText(line,0.8,0.2,font,
new THREE.MeshStandardMaterial({color:0xffffff}));
mesh.position.y=4 - i*2;
mesh.material.transparent=true;
mesh.material.opacity=0;
messageGroup.add(mesh);
gsap.to(mesh.material,{opacity:1,duration:2,delay:i*1.5});
});

const byMesh=createCenteredText("By Jason Abel",1.2,0.4,font,
new THREE.MeshStandardMaterial({
color:0xff4da6,
metalness:1,
roughness:0.2
}));
byMesh.position.y=-6;
messageGroup.add(byMesh);

gsap.to(byMesh.rotation,{y:Math.PI*2,duration:8,repeat:-1,ease:"none"});
});
}

function animate(){
requestAnimationFrame(animate);

smoke.forEach(s=>{
s.position.y+=0.05;
s.material.opacity-=0.01;
});

confetti.forEach(c=>{
c.position.y-=0.2;
c.rotation.x+=0.1;
});

renderer.render(scene,camera);
}
</script>
</body>
</html>
