<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Sahithi</title>
<style>
body { margin:0; overflow:hidden; background:#0F051D; }
#hint {
position:absolute;
bottom:25px;
width:100%;
text-align:center;
color:white;
opacity:0.6;
font-family:Arial;
letter-spacing:2px;
}
.fade { animation: fade 2s forwards; }
@keyframes fade { to { opacity:0; } }
</style>
</head>
<body>
<div id="hint">Click to Begin ✨</div>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_6f9c3c4a3f.mp3" type="audio/mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/FontLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/geometries/TextGeometry.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<script>

let scene, camera, renderer;
let stage = 0;
let heroGroup, cakeGroup, messageGroup;
let flames = [], smoke = [], confetti = [], hearts = [];

init();
animate();

function init(){
scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x0F051D, 20, 120);

camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,0,30);

renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const ambient = new THREE.AmbientLight(0xffffff,0.6);
scene.add(ambient);

const pink = new THREE.PointLight(0xff4da6,3);
pink.position.set(15,20,15);
scene.add(pink);

createStars();

window.addEventListener("click",startExperience);
}

function createStars(){
const geo = new THREE.BufferGeometry();
const vertices=[];
for(let i=0;i<2000;i++){
vertices.push(
THREE.MathUtils.randFloatSpread(300),
THREE.MathUtils.randFloatSpread(300),
THREE.MathUtils.randFloatSpread(300)
);
}
geo.setAttribute('position',new THREE.Float32BufferAttribute(vertices,3));
const mat = new THREE.PointsMaterial({color:0xffffff,size:0.7});
const stars = new THREE.Points(geo,mat);
scene.add(stars);
}

function startExperience(){
if(stage!==0) return;
document.getElementById("hint").classList.add("fade");
createHero();
stage=1;
}

function createHero(){
heroGroup = new THREE.Group();
scene.add(heroGroup);

const loader=new THREE.FontLoader();
loader.load('https://threejs.org/examples/fonts/helvetiker_bold.typeface.json',font=>{

const mat = new THREE.MeshStandardMaterial({
color:0xff4da6,
metalness:1,
roughness:0.2,
emissive:0xff4da6,
emissiveIntensity:0.8
});

const geo=new THREE.TextGeometry("HAPPY BIRTHDAY",{font:font,size:2.5,height:1});
const text=new THREE.Mesh(geo,mat);
text.position.x=-60;
text.position.y=5;
heroGroup.add(text);

gsap.to(text.position,{x:-15,duration:2,ease:"power4.out"});

const nameGeo=new THREE.TextGeometry("Sahithi (Chotedonn)",{font:font,size:1.2,height:0.5});
const nameMat=new THREE.MeshStandardMaterial({color:0xffffff});
const nameMesh=new THREE.Mesh(nameGeo,nameMat);
nameMesh.position.y=-5;
nameMesh.scale.set(0,0,0);
heroGroup.add(nameMesh);

gsap.to(nameMesh.scale,{x:1,y:1,z:1,duration:1.5,delay:1});
});

gsap.to(camera.position,{z:22,duration:3});
}

function createCake(){
cakeGroup=new THREE.Group();
scene.add(cakeGroup);

const mat=new THREE.MeshStandardMaterial({color:0xff85c2});
const tier1=new THREE.Mesh(new THREE.CylinderGeometry(7,7,2,32),mat);
const tier2=new THREE.Mesh(new THREE.CylinderGeometry(4.5,4.5,2,32),mat);
tier2.position.y=2;
const tier3=new THREE.Mesh(new THREE.CylinderGeometry(3,3,2,32),mat);
tier3.position.y=4;

cakeGroup.add(tier1,tier2,tier3);

for(let i=0;i<7;i++){
const candle=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.2,1,16),
new THREE.MeshStandardMaterial({color:0xffffff}));
candle.position.set(Math.cos(i)*2.5,5.5,Math.sin(i)*2.5);
cakeGroup.add(candle);

const flame=new THREE.Mesh(new THREE.SphereGeometry(0.35,16,16),
new THREE.MeshBasicMaterial({color:0xffd166}));
flame.position.y=0.8;
candle.add(flame);
flames.push(flame);
}

gsap.to(cakeGroup.rotation,{y:Math.PI*2,duration:20,repeat:-1,ease:"none"});
gsap.to(camera.position,{z:25,y:5,duration:2});
}

function blowCandles(){
flames.forEach(f=>f.visible=false);

for(let i=0;i<80;i++){
const s=new THREE.Mesh(new THREE.SphereGeometry(0.2),
new THREE.MeshBasicMaterial({color:0xaaaaaa,transparent:true,opacity:0.5}));
s.position.set(THREE.MathUtils.randFloatSpread(6),6,THREE.MathUtils.randFloatSpread(6));
scene.add(s);
smoke.push(s);
}

for(let i=0;i<300;i++){
const piece=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.2,0.2),
new THREE.MeshBasicMaterial({color:Math.random()*0xffffff}));
piece.position.set(0,6,0);
scene.add(piece);
confetti.push(piece);
}
}

function createMessage(){
messageGroup=new THREE.Group();
scene.add(messageGroup);

const loader=new THREE.FontLoader();
loader.load('https://threejs.org/examples/fonts/helvetiker_regular.typeface.json',font=>{

const fullMessage=`Happy Birthday to the most incredible person 🌸✨
You are the kind of person who makes everything better.
You deserve all the happiness and magic in life.
Happy birthday Chotedonn!!`;

const geo=new THREE.TextGeometry(fullMessage,{font:font,size:0.9,height:0.2});
const mesh=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({color:0xffffff}));
mesh.position.set(-18,5,0);
mesh.material.transparent=true;
mesh.material.opacity=0;
messageGroup.add(mesh);

gsap.to(mesh.material,{opacity:1,duration:3});

const byGeo=new THREE.TextGeometry("By Jason Abel",{font:font,size:1.5,height:0.5});
const byMesh=new THREE.Mesh(byGeo,new THREE.MeshStandardMaterial({
color:0xff4da6,
metalness:1,
roughness:0.1,
emissive:0xff4da6,
emissiveIntensity:0.8
}));
byMesh.position.set(-5,-8,0);
messageGroup.add(byMesh);

gsap.to(byMesh.rotation,{y:Math.PI*2,duration:10,repeat:-1,ease:"none"});
});

gsap.to(camera.position,{z:35,y:0,duration:4});
}

window.addEventListener("click",()=>{
if(stage===1){
scene.remove(heroGroup);
createCake();
stage=2;
}
else if(stage===2){
blowCandles();
setTimeout(()=>{
scene.remove(cakeGroup);
createMessage();
stage=3;
},3500);
}
});

function animate(){
requestAnimationFrame(animate);

smoke.forEach(s=>{
s.position.y+=0.05;
s.material.opacity-=0.01;
});

confetti.forEach(c=>{
c.position.y-=0.25;
c.rotation.x+=0.1;
});

renderer.render(scene,camera);
}

</script>
</body>
</html>
